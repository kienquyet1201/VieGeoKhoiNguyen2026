<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đấu trường Luyện thi THPT | VieGeo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bento.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="exam-arena-page">
    <main class="exam-arena-shell" aria-label="Đấu trường Luyện thi THPT">
        <header class="exam-topbar">
            <div>
                <p class="exam-eyebrow"><i class="fa-solid fa-graduation-cap"></i> VieGeo Exam Prep</p>
                <h1>Đấu trường Luyện thi THPT</h1>
                <p>Đề luyện 40 câu · Bám sát nhịp làm bài trong 50 phút</p>
            </div>
            <div class="exam-topbar-actions">
                <a class="exam-back-link" href="map.html"><i class="fa-solid fa-arrow-left"></i><span>Về lộ trình</span></a>
                <div class="exam-timer" aria-live="polite">
                    <i class="fa-solid fa-stopwatch"></i>
                    <span id="examTimer">50:00</span>
                </div>
            </div>
        </header>

        <div class="exam-workspace">
            <section class="exam-question-card" aria-live="polite">
                <div class="exam-question-meta">
                    <span id="examQuestionCounter">Câu 1 / 40</span>
                    <span id="examQuestionTag">Atlat & kỹ năng địa lí</span>
                </div>
                <h2 id="examQuestionText"></h2>
                <div id="examOptions" class="exam-options" role="radiogroup" aria-label="Các phương án trả lời"></div>
                <div class="exam-controls">
                    <button id="examPrevious" class="exam-secondary-btn" type="button"><i class="fa-solid fa-arrow-left"></i> Câu trước</button>
                    <button id="examMark" class="exam-mark-btn" type="button"><i class="fa-regular fa-bookmark"></i> Đánh dấu</button>
                    <button id="examNext" class="exam-primary-btn" type="button">Câu tiếp <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </section>

            <aside class="exam-navigator-card">
                <div class="exam-nav-heading">
                    <div>
                        <h2>Danh sách câu hỏi</h2>
                        <p><strong id="examAnsweredCount">0</strong>/40 câu đã trả lời</p>
                    </div>
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div id="examQuestionNav" class="exam-question-nav" aria-label="Đi tới câu hỏi"></div>
                <div class="exam-legend">
                    <span><i class="legend-current"></i>Đang làm</span>
                    <span><i class="legend-answered"></i>Đã trả lời</span>
                    <span><i class="legend-marked"></i>Đánh dấu</span>
                </div>
                <button id="examSubmit" class="exam-submit-btn" type="button"><i class="fa-solid fa-paper-plane"></i> Nộp bài</button>
            </aside>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="gamedata.js"></script>
    <script src="telemetry.js"></script>
    <script src="exam-arena.js"></script>
</body>
</html>
