<!DOCTYPE html>
<html>
<head>
    <title>Set Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
</head>
<body>
    <h2>Cấp quyền Admin cho kienquyet1201@gmail.com</h2>
    <button onclick="setAdmin()">Cấp Quyền Ngay</button>
    <p id="status"></p>

    <script>
        async function setAdmin() {
            try {
                document.getElementById('status').innerText = "Đang xử lý...";
                await db.collection('users').doc('kienquyet1201@gmail.com').update({
                    accountStatus: 'premium',
                    role: 'admin'
                });
                document.getElementById('status').innerText = "Thành công! kienquyet1201@gmail.com đã trở thành Admin.";
            } catch (error) {
                document.getElementById('status').innerText = "Lỗi: " + error.message;
            }
        }
    </script>
</body>
</html>
