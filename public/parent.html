<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VieGeo - Bảng Điều Khiển Phụ Huynh</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="bento.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="padding: 40px; justify-content: flex-start; height: auto; min-height: 100vh;">

    <div style="max-width: 1000px; margin: 0 auto; width: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div class="app-logo" style="margin-bottom: 0;">
                <i class="fa-solid fa-earth-asia"></i> VieGeo <span style="font-size: 1.2rem; color: var(--gold);">| Phụ Huynh</span>
            </div>
            <button class="bento-btn" onclick="window.location.href='/'" style="background: rgba(255,255,255,0.1);">Trở về Trang chủ</button>
            <div style="position: relative; display: inline-block; margin-left: 10px;" onmouseover="document.getElementById('parentRoleDrop').style.display='block'" onmouseout="document.getElementById('parentRoleDrop').style.display='none'">
                <button class="bento-btn" style="background: rgba(255,255,255,0.1);"><i class="fa-solid fa-users-gear"></i> Đổi Quyền</button>
                <div id="parentRoleDrop" style="display: none; position: absolute; top: 100%; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; min-width: 160px; z-index: 1000; overflow: hidden;">
                    <a href="/map" onclick="return switchRoleClientOnly('user')" style="display: block; padding: 10px 15px; color: white; text-decoration: none; border-bottom: 1px solid #334155;"><i class="fa-solid fa-graduation-cap"></i> Học sinh</a>
                    <a href="/parent" onclick="return switchRoleClientOnly('parent')" style="display: block; padding: 10px 15px; color: #f59e0b; text-decoration: none; border-bottom: 1px solid #334155;"><i class="fa-solid fa-children"></i> Phụ huynh</a>
                    <a href="/cs-dashboard" onclick="return switchRoleClientOnly('cs')" style="display: block; padding: 10px 15px; color: white; text-decoration: none; border-bottom: 1px solid #334155;"><i class="fa-solid fa-headset"></i> CSKH</a>
                    <a href="/admin" onclick="return switchRoleClientOnly('admin')" style="display: block; padding: 10px 15px; color: white; text-decoration: none;"><i class="fa-solid fa-screwdriver-wrench"></i> Admin</a>
                </div>
            </div>
        </div>

        <div class="bento-card" style="border-top: 4px solid var(--blue); margin-bottom: 30px;">
            <h2 style="font-size: 1.8rem; margin-bottom: 20px;"><i class="fa-solid fa-chart-line"></i> Báo Cáo Tiến Độ Học Tập</h2>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; text-align: center;">
                    <i class="fa-solid fa-fire" style="font-size: 2.5rem; color: #ff9600; margin-bottom: 10px;"></i>
                    <p style="color: var(--text-dim); margin-bottom: 5px;">Chuỗi học liên tiếp</p>
                    <h3 id="statStreak" style="font-size: 2rem;">0 Ngày</h3>
                </div>
                
                <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; text-align: center;">
                    <i class="fa-solid fa-book-open-reader" style="font-size: 2.5rem; color: #1cb0f6; margin-bottom: 10px;"></i>
                    <p style="color: var(--text-dim); margin-bottom: 5px;">Bài học hoàn thành</p>
                    <h3 id="statCompleted" style="font-size: 2rem;">0 Bài</h3>
                </div>
                
                <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; text-align: center;">
                    <i class="fa-solid fa-stopwatch" style="font-size: 2.5rem; color: #ce82ff; margin-bottom: 10px;"></i>
                    <p style="color: var(--text-dim); margin-bottom: 5px;">Hoạt động hôm nay</p>
                    <h3 id="statActivity" style="font-size: 1.5rem; color: var(--green);">Đã học</h3>
                </div>
            </div>
        </div>
        
        <div class="bento-card" style="border-top: 4px solid var(--green);">
            <h2 style="font-size: 1.5rem; margin-bottom: 20px;"><i class="fa-solid fa-bell"></i> Phân Tích & Cảnh Báo</h2>
            <div id="parentReport" style="line-height: 1.8; color: var(--text-main); font-size: 1.1rem;">
                Đang tải dữ liệu...
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawState = localStorage.getItem('VieGeo_state');
            if (rawState) {
                const state = JSON.parse(rawState);
                
                document.getElementById('statStreak').textContent = (state.streak || 0) + " Ngày";
                document.getElementById('statCompleted').textContent = (state.completedNodes ? state.completedNodes.length : 0) + " Bài";
                
                const today = new Date().toISOString().split('T')[0];
                const lastLogin = state.lastLogin || '';
                if (lastLogin === today) {
                    document.getElementById('statActivity').textContent = "Đã học hôm nay";
                    document.getElementById('statActivity').style.color = "var(--green)";
                } else {
                    document.getElementById('statActivity').textContent = "Chưa học hôm nay";
                    document.getElementById('statActivity').style.color = "var(--red)";
                }
                
                let report = `Học sinh đang duy trì tiến độ học tập <b>${state.streak || 0} ngày liên tiếp</b>. `;
                if (state.completedNodes && state.completedNodes.length > 0) {
                    report += `Tổng số lượng bài học hoàn thành là <b>${state.completedNodes.length} bài</b>. `;
                }
                
                if (lastLogin !== today) {
                    report += `<br><br><span style="color: var(--red);"><i class="fa-solid fa-triangle-exclamation"></i> <b>Cảnh báo:</b> Hôm nay con chưa hoàn thành bài học nào. Phụ huynh vui lòng nhắc nhở để tránh mất chuỗi (Streak).</span>`;
                } else {
                    report += `<br><br><span style="color: var(--green);"><i class="fa-solid fa-check-circle"></i> <b>Tốt:</b> Con đã hoàn thành bài học hôm nay. Quá trình học tập đang diễn ra rất tích cực.</span>`;
                }
                
                document.getElementById('parentReport').innerHTML = report;
                
            } else {
                document.getElementById('parentReport').innerHTML = "Chưa có dữ liệu học tập trên thiết bị này. Vui lòng cho học sinh đăng nhập và hoàn thành bài học đầu tiên.";
            }
        });
    </script>
    <script>
    window.switchRoleClientOnly = function(role) {
        if(!role) return;
        try {
            var session = JSON.parse(localStorage.getItem('lm_session')) || {};
            const aliases = { map: 'user', student: 'user', cskh: 'cs', support: 'cs' };
            const normalizedRole = aliases[String(role || '').toLowerCase()] || String(role || '').toLowerCase();
            const roleLinks = { user: '/map', parent: '/parent-dashboard', cs: '/cs-dashboard', admin: '/admin-dashboard', teacher: '/teacher-dashboard' };
            const source = Array.isArray(session.roles) ? session.roles : [session.role || session.activeRole];
            const allowedRoles = [...new Set(source.map(item => aliases[String(item || '').toLowerCase()] || String(item || '').toLowerCase()).filter(item => Boolean(roleLinks[item])))];
            if (!allowedRoles.includes(normalizedRole)) { if (window.Swal) Swal.fire({icon:'warning',title:'Không có quyền truy cập',text:'Vai trò này chưa được cấp cho tài khoản của bạn.'}); return false; }
            session.roles = allowedRoles;
            session.role = normalizedRole;
            session.activeRole = normalizedRole;
            localStorage.setItem('lm_session', JSON.stringify(session));
            window.location.href = roleLinks[normalizedRole];
        } catch(e) { console.error('switchRole error:', e); }
        return false;
    };
    document.addEventListener('DOMContentLoaded', () => {
        try {
            const session = JSON.parse(localStorage.getItem('lm_session') || '{}');
            const aliases = { map: 'user', student: 'user', cskh: 'cs', support: 'cs' };
            const source = Array.isArray(session.roles) ? session.roles : [session.role || session.activeRole];
            const allowedRoles = [...new Set(source.map(role => aliases[String(role || '').toLowerCase()] || String(role || '').toLowerCase()))];
            const drop = document.getElementById('parentRoleDrop');
            const wrap = drop?.parentElement;
            if (!drop || !wrap) return;
            if (allowedRoles.length < 2) { wrap.style.display = 'none'; return; }
            drop.querySelectorAll('a[onclick]').forEach((link) => {
                const match = link.getAttribute('onclick').match(/'([^']+)'/);
                if (!match || !allowedRoles.includes(match[1])) link.remove();
            });
        } catch (error) { console.warn('Không thể dựng danh sách quyền:', error); }
    });
    </script>
</body>
</html>
