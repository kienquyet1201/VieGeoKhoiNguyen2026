<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VieGeo - Hồ sơ người chơi</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="VieGeo.css">
    <link rel="stylesheet" href="map.css"> <!-- Tái sử dụng sidebar từ map.css -->
    <style>
        .profile-container {
            width: 100%;
            max-width: 600px;
            margin: 40px auto;
            background: var(--bg-card);
            border: 2px solid var(--gray-light-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--blue);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 8px 0 var(--blue-shadow);
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 32px 0;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--gray-light-border);
            border-radius: 16px;
            padding: 16px;
        }
        
        .stat-box i { font-size: 1.5rem; margin-bottom: 8px; }
        .stat-box .val { font-size: 1.2rem; font-weight: 800; font-family: var(--font-heading); }
        .stat-box .lbl { font-size: 0.8rem; color: var(--text-muted); }

    </style>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="profile-page">
    <div class="profile-page-scroll h-full min-h-screen w-full overflow-y-auto pb-40">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-earth-asia"></i> VieGeo
        </div>
        <nav class="nav-menu">
            <a href="/map" class="nav-item"><i class="fa-solid fa-house"></i> Lộ trình</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-shield-halved"></i> Xếp hạng</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-treasure-chest"></i> Nhiệm vụ</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-shop"></i> Cửa hàng</a>
            <a href="/profile" class="nav-item active"><i class="fa-solid fa-user"></i> Hồ sơ</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content profile-main w-full pb-40">
        
        <div class="profile-container">
            <div class="avatar-circle">
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
            <h2 id="dispName" style="font-size: 1.8rem; margin-bottom: 5px;">Người chơi</h2>
            <p id="dispEmail" style="color: var(--text-muted);">email@example.com</p>

            <div class="stats-grid">
                <div class="stat-box" style="color: var(--gold)">
                    <i class="fa-solid fa-fire"></i>
                    <div class="val" id="profStreak">0</div>
                    <div class="lbl">Chuỗi ngày</div>
                </div>
                <div class="stat-box" style="color: var(--blue)">
                    <i class="fa-solid fa-star"></i>
                    <div class="val" id="profXp">0</div>
                    <div class="lbl">Kinh nghiệm</div>
                </div>
                <div class="stat-box" style="color: var(--green)">
                    <i class="fa-solid fa-brain"></i>
                    <div class="val" id="profStyle">Chưa test</div>
                    <div class="lbl">Phong cách học</div>
                </div>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label>Tên hiển thị</label>
                    <input type="text" id="profName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" id="profPhone" class="form-input" placeholder="Thêm số điện thoại...">
                </div>
                <div class="form-group">
                    <label for="profGender">Giới tính</label>
                    <select id="profGender" class="form-input">
                        <option value="">Chưa cập nhật</option>
                        <option value="male">Nam</option>
                        <option value="female">Nữ</option>
                        <option value="other">Khác</option>
                        <option value="prefer_not_to_say">Không muốn tiết lộ</option>
                    </select>
                </div>

                <div class="form-group" style="background: rgba(255,200,0,0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--gold);">
                    <label style="color: var(--gold);">Đổi mật khẩu (Tuỳ chọn)</label>
                    <input type="password" id="oldPass" class="form-input" placeholder="Mật khẩu cũ" style="margin-bottom: 10px;">
                    <input type="password" id="newPass" class="form-input" placeholder="Mật khẩu mới">
                </div>

                <div style="display: flex; gap: 16px; margin-top: 30px;">
                    <button type="button" class="btn-game btn-outline" id="btnLogout" style="flex: 1;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Thoát</button>
                    <button type="button" class="btn-game" id="btnPremium" style="flex: 1; background: var(--gold); color: #000;"><i class="fa-solid fa-crown"></i> Yêu cầu Mua Premium</button>
                    <button type="submit" class="btn-game btn-primary" style="flex: 1;">Lưu Thay Đổi</button>
                </div>
            </form>
        </div>

    </main>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="firebase-init.js"></script>
    <script src="gamedata.js"></script>
    <script src="profile.js"></script>
</body>
</html>
